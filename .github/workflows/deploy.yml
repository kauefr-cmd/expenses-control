name: Deploy VPS

on:
  # Para deploy automático a cada push na main, descomente o bloco abaixo
  # (faça isso só DEPOIS de cadastrar os secrets, senão a Action falha):
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0   # 3rd-party; pinado numa versão
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}     # opcional; vazio = 22
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PATH }}"
            git pull --ff-only origin main
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link 2>/dev/null || true
            php artisan queue:restart
            # migrations/assets desligados por padrão (ver caveats do deploy.sh):
            # php artisan migrate --force
            # npm ci && npm run build
